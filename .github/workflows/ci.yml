name: CI

'on':
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  WHITAKER_INSTALLER_VERSION: '0.2.5'

jobs:
  spelling:
    name: spelling
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.14'
          enable-cache: false
      - name: Check spelling
        run: make spelling

  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.12"
      - name: Install markdownlint-cli2
        shell: bash
        run: |
          set -euo pipefail
          bun install --global markdownlint-cli2@0.22.0
      - name: Build
        run: make build

  check-fmt:
    name: check-fmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.12"
      - name: Install markdownlint-cli2
        shell: bash
        run: |
          set -euo pipefail
          bun install --global markdownlint-cli2@0.22.0
      - name: Check formatting
        run: make check-fmt

  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.12"
      - name: Install markdownlint-cli2
        shell: bash
        run: |
          set -euo pipefail
          bun install --global markdownlint-cli2@0.22.0
      - name: Cache Whitaker installer
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
            ~/.local/share/whitaker
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        shell: bash
        run: |
          set -euxo pipefail
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer
      - name: Lint
        run: make lint
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.13'
          enable-cache: true
      - name: Workflow contract tests
        run: make test-workflow-contracts

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.12"
      - name: Install markdownlint-cli2
        shell: bash
        run: |
          set -euo pipefail
          bun install --global markdownlint-cli2@0.22.0
      - name: Test
        run: make test

  docs-gate:
    name: docs-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
      - name: Build docs-gate helper
        shell: bash
        run: |
          set -euo pipefail
          cargo build --quiet -p repovec-ci
      - name: Decide whether documentation gates should run
        id: docs_gate_plan
        shell: bash
        run: |
          set -euo pipefail

          base_ref=""
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            base_ref="${{ github.event.before }}"
          fi

          if [[ -n "${base_ref}" && "${base_ref}" != "0000000000000000000000000000000000000000" ]]; then
            mapfile -t changed_files < <(git diff --name-only "${base_ref}" "${GITHUB_SHA}")
          else
            changed_files=()
          fi

          if [[ "${#changed_files[@]}" -gt 0 ]]; then
            printf '%s\n' "${changed_files[@]}" | target/debug/repovec-ci --stdin >>"${GITHUB_OUTPUT}"
          else
            target/debug/repovec-ci >>"${GITHUB_OUTPUT}"
          fi
      - name: Report documentation gate decision
        shell: bash
        run: |
          set -euo pipefail
          echo "should_run=${{ steps.docs_gate_plan.outputs.should_run }}"
          echo "docs_gate_required=${{ steps.docs_gate_plan.outputs.docs_gate_required }}"
          echo "nixie_required=${{ steps.docs_gate_plan.outputs.nixie_required }}"
          echo "reason=${{ steps.docs_gate_plan.outputs.reason }}"
          echo "matched_files_count=${{ steps.docs_gate_plan.outputs.matched_files_count }}"
          echo "matched_files=${{ steps.docs_gate_plan.outputs.matched_files }}"
          echo "conservative_fallback_files_count=${{ steps.docs_gate_plan.outputs.conservative_fallback_files_count }}"
          echo "conservative_fallback_files=${{ steps.docs_gate_plan.outputs.conservative_fallback_files }}"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        if: steps.docs_gate_plan.outputs.docs_gate_required == 'true'
        with:
          bun-version: "1.3.12"
      - name: Install markdownlint-cli2
        if: steps.docs_gate_plan.outputs.docs_gate_required == 'true'
        shell: bash
        run: |
          set -euo pipefail
          bun install --global markdownlint-cli2@0.22.0
      - name: Markdown lint
        if: steps.docs_gate_plan.outputs.docs_gate_required == 'true'
        run: make markdownlint
      - name: Setup uv for Nixie
        if: steps.docs_gate_plan.outputs.nixie_required == 'true'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      - name: Install Mermaid validation tools
        if: steps.docs_gate_plan.outputs.nixie_required == 'true'
        shell: bash
        run: |
          set -euo pipefail
          uv tool install nixie-cli==1.1.0
          cargo install merman-cli --version 0.7.0 --locked
      - name: Mermaid validation
        if: steps.docs_gate_plan.outputs.nixie_required == 'true'
        run: make nixie
      - name: Skip documentation gates
        if: steps.docs_gate_plan.outputs.docs_gate_required != 'true'
        run: echo "No documentation inputs detected; documentation gates skipped."

  systemd-gate:
    name: systemd-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
      - name: Validate checked-in systemd units
        run: make validate-systemd
